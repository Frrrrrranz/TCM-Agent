name: TCM-Agent Harness

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]

# NOTE: 两个 Job 独立并行执行，任一失败即标红整个 CI
jobs:
  # ─── TypeScript Agent 验证 ────────────────────────────────────────────
  typescript-check:
    name: TypeScript Agent (Node.js 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 开启 npm 依赖缓存，避免每次重新安装
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: .
        run: npm ci

      # TypeScript 强类型校验，确保无 any / 类型不匹配
      - name: Type check
        working-directory: .
        run: npm run check

      # 运行主 Agent 的全量测试用例（当前 204 个）
      - name: Run tests
        working-directory: .
        run: npm test

  web-ui-build:
    name: Web UI Build (Node.js 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build Web UI
        working-directory: web
        run: npm run build

  # ─── Python MCP Server 验证 ───────────────────────────────────────────
  python-harness:
    name: Python MCP Harness (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 开启 pip 依赖缓存，基于 pyproject.toml hash 失效
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: tcm-mcp-server/pyproject.toml

      # NOTE: 缓存 ChromaDB 下载的 ONNX Embedding 模型（约 79MB）。
      # 该模型存储在 ~/.cache/chroma，由 chromadb 在首次调用时自动下载。
      # 固化缓存后，后续 CI 运行无需重新拉取，避免国际网络下载超时。
      - name: Cache ChromaDB ONNX model
        uses: actions/cache@v4
        with:
          path: ~/.cache/chroma
          key: chroma-onnx-${{ runner.os }}-v1

      - name: Install dependencies
        working-directory: tcm-mcp-server
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      # PYTEST_DISABLE_PLUGIN_AUTOLOAD=1：禁用全局 Anaconda pytest 插件（NumPy 2 兼容冲突）
      # --ignore=tests/integration：集成测试依赖 MCP stdio 进程启动，在 CI 中按需分离执行
      - name: Run Python Harness
        working-directory: tcm-mcp-server
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: pytest tests -q --ignore=tests/integration
